<!DOCTYPE html>

<html lang="vi">

<head>

<meta charset="UTF-8">

<title>Profile cực cháy của t</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

* {

    margin: 0;

    padding: 0;

    box-sizing: border-box;

    font-family: 'Orbitron', sans-serif;

}

body {

    height: 100vh;

    background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);

    display: flex;

    justify-content: center;

    align-items: center;

    overflow: hidden;

}

/* nền hạt bay */

body::before {

    content: "";

    position: absolute;

    width: 200%;

    height: 200%;

    background: repeating-radial-gradient(circle, rgba(255,255,255,0.05) 2px, transparent 5px);

    animation: moveBg 20s linear infinite;

}

@keyframes moveBg {

    from { transform: translate(0,0); }

    to { transform: translate(-200px,-200px); }

}

.card {

    position: relative;

    padding: 40px;

    width: 320px;

    text-align: center;

    border-radius: 20px;

    background: rgba(0,0,0,0.6);

    box-shadow: 0 0 20px #00ffff, 0 0 60px #00ffff;

    backdrop-filter: blur(10px);

    z-index: 1;

}

.avatar {

    width: 110px;

    height: 110px;

    border-radius: 50%;

    border: 3px solid #00ffff;

    box-shadow: 0 0 20px #00ffff;

    margin-bottom: 15px;

}

h1 {

    color: #00ffff;

    margin-bottom: 5px;

}

p {

    font-size: 13px;

    color: #aaa;

    margin-bottom: 20px;

}

.btn {

    display: block;

    margin: 10px 0;

    padding: 12px;

    border-radius: 10px;

    text-decoration: none;

    color: #fff;

    border: 1px solid #00ffff;

    transition: 0.3s;

    position: relative;

    overflow: hidden;

}

.btn::before {

    content: "";

    position: absolute;

    width: 0;

    height: 100%;

    background: #00ffff;

    top: 0;

    left: 0;

    transition: 0.3s;

    z-index: -1;

}

.btn:hover::before {

    width: 100%;

}

.btn:hover {

    color: #000;

    transform: scale(1.05);

}

</style>

</head>

<body>

<div class="card">

    <img src="https://i.imgur.com/your-avatar.png" class="avatar">

    <h1>Tên của t</h1>

    <p>bio nhìn phát biết đẳng cấp 😎</p>

    <a class="btn" href="https://www.facebook.com/share/185aX6qpZ4/?mibextid=wwXIfr" target="_blank">

        Facebook

    </a>

    <a class="btn" href="https://tiktok.com/@kbx2112" target="_blank">

        TikTok

    </a>

</div>

</body>

</html>
